<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lucky-number-home</title>
    <style>
        body{
            background-color: rgb(73, 58, 58);
            padding: 0px;
            margin: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        header{
            background-color: navy;
            padding: 10px;
            padding-left: 10%;
            padding-right: 10%;
            color: aquamarine;
            position: fixed;
            width: 100%;
            top: 0;
            
        }
        .header-content{
            margin: 0px;
            padding-left: 10px;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            /* background-color: red; */
        }

        /* Menu icon (hamburger) */
        .menu-icon {
        margin: 0px;
        width: 30px;
        height: 20px;
        cursor: pointer;
        position: fixed;
        top: 25px;
        left: 10px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        /* padding-top: 10px; */
        }

        .menu-icon .bar {
        padding: 0px;
        height: 3px;
        width: 50%;
        background-color: white;
        border-radius: 2px;
        background-color: aqua;
        /* padding-top: 10px; */
        }

        /* Hidden menu */
        .menu {
        display: none;
        background: navy;
        padding: 5px;
    }
    
    .menu ul {
        list-style: none;
        padding: 0;
        /* background-color: navy; */
    }
    
    .menu ul li {
        margin: 0px 0;
        padding-top: 5px;
        padding-left: 20px;
        }

        .menu ul li a {
        /* display: flex; */
        flex-direction: row;
        padding: 2px;
        text-decoration: none;
        color: aquamarine;
        }
        .menu ul li a:hover{
            color: rgb(206, 17, 149);
        }
        #h1{
            font-size: x-small;
           
        }
        
       
         header button{
            position: fixed;
            right: 5px;
            top: 30px;
            color: white;
            border: none;
            background-color: rgb(243, 79, 79);
            border-color: aquamarine;
            font-size: small;
            cursor: pointer; 
            border-radius: .3em;
            padding: 5px;
            width: 70px;
            transition: .3s all;
        } 
        header button:hover{
            background-color: red;
            transform: translateX(5px);
        }
        
        main{
            position: absolute;
            top: 17%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80%;
            width: 90%;
            background-color: aqua;
            border-radius: 10px;
            border-color: red;
            
        }
        main #para{
            display: flex;
            justify-content: center;
            align-items: center; 
            font-size: large;
        }
        .buttons{
            display: flex;
            justify-content: space-between;
           
            
        }
        .buttons #btn{
            /* padding: 10%; */
            display: flex;
            font-size: xx-large;
            /* flex-direction: row; */
            justify-content: space-around;
            align-items: center;
            color: white;
            background-color: rgb(16, 16, 143);
            border-radius: 30px;
            width: 50px;
            cursor: pointer;
            border: none;
        }
        .buttons #btn:hover{
            color: white;
            background-color: blue;
            transform: translateY(5px);
        }
        .rn-btn{
            padding: 10%;
        }
        #run-btn{
            height: 100px;
            width: 100px;
            color: white;
            background-color: rgb(7, 106, 73);
            padding: 20%;
            border: none;
            border-radius: 50%;
            border-color: wheat;
            font-size: xx-large;
            cursor: pointer;
            text-align: center;
            padding-left: 12px;
            transition: .3s all;
        }
        #run-btn:hover{
            background-color: green;
            transform: translateY(10px);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <!-- Menu Icon -->
            <div  class="menu-icon" onclick="toggleMenu()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <!-- Hidden Menu -->
            <nav id="menu" class="menu">
                <ul>
                    <li><a href="{% url 'index' %}">Home</a>
                        <a href="{% url 'wallet' %}">My Wallet</a>
                        <a href="{% url 'deposit' %}">Deposit</a>
                        <a href="{% url 'withdraw' %}">Withdraw</a>
                    </li>
                </ul>
            </nav>
            
            <div id="h1">
                <h1>LUCKY NUMBER BET</h1>
            </div>
            <div >
                <a id="hd-btn" href="{% url 'login' %}"><button onclick="logout()">Log Out</button></a>
            </div>
            
        </div>
    </header>
    <main>
        <div id="para">
            <p>Pick Your Lucky Number</p>
        </div>
        <div class="buttons">
            <button onclick="message_1()" id="btn">1</button>
            <button onclick="message_2()" id="btn">2</button>
            <button onclick="message_3()" id="btn">3</button>
            <button onclick="message_4()" id="btn">4</button>
            <button onclick="message_5()" id="btn">5</button>
        </div>
        <div class="rn-btn">
            <button id="run-btn">RUN</button>
        </div>
        <div class="message-body">
            {% if messages %}
            {% for message in messages %}
            <div class="message">
            {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        </div>
    </main>
</body>
<script>
    function logout(){
        alert('You Logged Out')
    }
    function message_1(){
        alert('Your lucky number is: 1')
    }
    function message_2(){
        alert('Your lucky number is: 2')
    }
    function message_3(){
        alert('Your lucky number is: 3')
    }
    function message_4(){
        alert('Your lucky number is: 4')
    }
    function message_5(){
        alert('Your lucky number is: 5')
    }
    function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
  }

</script>
</html>
