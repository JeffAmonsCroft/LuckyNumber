<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lucky-number-login</title>
    <style>
        body{
            background-color: rgb(73, 58, 58);
            padding: 0px;
            margin: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        header{
            background-color: navy;
            color: aquamarine;
            position: fixed;
            width: 100%;
            top: 0;
            
        }
        header h1{
            padding-left: 20px;
        }
        header button{
            position: fixed;
            right: 10px;
            top: 30px;
            color: white;
            border: none;
            background-color: rgb(49, 49, 184);
            border-radius: 10px;
            border-color: aquamarine;
            font-size: large;
            cursor: pointer;
            border-radius: .3em;
            padding: 5px;
            transition: .3s all;
            
        }
        header button:hover{
            background-color: blue;
            transform: translateX(5px);
        }
        header div{
            display: flex;
            flex-direction: row;
        }
        main{
            position: absolute;
            top: 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70%;
            width: 90%;
            background-color: aqua;
            border-radius: 10px;
            border-color: red;
            
        }
        .log-content{
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        } 
        .email{
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .password{
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #inpt{
            padding: 10px;
            padding-left: 30px;
            text-align: center;
            border: none;
            border-radius: 10px;
        } 
        #label{
            padding: 5px;
            font-size: large;
        }  
        #label_email{
            padding: 5px;
            font-size: large;
        } 
        .btn{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #sbmt-btn{
            background-color: rgb(7, 106, 73);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 10px;
            font-size: large;
            width: 50%;
            cursor: pointer;
            transition: .3s all;
        }
        #sbmt-btn:hover{
            background-color: green;
            cursor: red;
            transform: translateY(10px);
        }
        .message-body{
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        .message{
            color: red;
            background-color: rgb(225, 245, 245);
            width: 300px;
            height: 30px;
            
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>LUCKY NUMBER</h1>
            <a href="{% url 'signup' %}"><button onclick="signup()">Sign Up</button></a>
        </div>
    </header>
    <main>
        <h1>Log In</h1>
        <div class="log-content">
            <form action="" method="POST">
                {% csrf_token %}
                <div class="email">
                    <label id="label_email" for="name">Name:</label>
                    <input id="inpt" type="text" name="username" placeholder="johndoe" required>
                </div>
                <br>
                <br>
                <div class="password">
                    <label id="label" for="password">Password:</label>
                    <input id="inpt" type="password" name="password" placeholder="*********" required>
                </div>
                <div class="btn">
                    <p>Forgot Password? <a href="">Reset</a></p>  
                    <button id="sbmt-btn" type="submit">Submit</button>
                </div>
                <div class="message-body">
                    {% if messages %}
                    {% for message in messages %}
                    <div class="message">
                    {{ message }}
                    </div>
                    {% endfor %}
                    {% endif %}
                </div>
            </form>
        </div>  
    </main>
</body>
</html>
