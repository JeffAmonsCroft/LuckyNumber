<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lucky-number-win</title>
    <style>
        body{
            background-color: rgb(73, 58, 58);
            padding: 0px;
            margin: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        header{
            background-color: navy;
            padding: 10px;
            padding-left: 10%;
            padding-right: 10%;
            color: aquamarine;
            position: fixed;
            width: 100%;
            top: 0;
            
        }
        .header-content{
            margin: 0px;
            padding-left: 10px;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            /* background-color: red; */
        }

        /* Menu icon (hamburger) */
        .menu-icon {
        margin: 0px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        position: fixed;
        top: 40px;
        left: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        /* padding-top: 10px; */
        }

        .menu-icon .bar {
        padding: 4px;
        height: 4px;
        width: 100%;
        background-color: white;
        border-radius: 2px;
        background-color: aqua;
        /* padding-top: 10px; */
        }

        /* Hidden menu */
        .menu {
        display: none;
        background: navy;
        padding: 5px;
    }
    
    .menu ul {
        list-style: none;
        padding: 0;
        /* background-color: navy; */
    }
    
    .menu ul li {
        margin: 10px 0;
        padding-top: 10px;
        }

        .menu ul li a {
        /* display: flex; */
        flex-direction: row;
        padding: 20px;
        text-decoration: none;
        color: aquamarine;
        }
        .menu ul li a:hover{
            color: rgb(206, 17, 149);
        }
        
       
        header button{
            position: fixed;
            right: 50px;
            top: 40px;
            color: white;
            border: none;
            background-color: rgb(232, 4, 4);
            border-radius: 10px;
            border-color: aquamarine;
            font-size: large;
            cursor: pointer; 
            border-radius: .3em;
            padding: 5px;
            transition: .3s all;
        }
        header button:hover{
            background-color: red;
            transform: translateX(5px);
        }
        main{
            position: absolute;
            top: 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70%;
            width: 60%;
            background-color: aqua;
            border-radius: 10px;
            border-color: red;
            
        }
        main h1{
            color: rgb(3, 54, 3);
        }
        .win-content{
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        } 
        .win-content p{
            color: green;
            font-size: x-large;
        }
        #win{
            font-size: xx-large;
            color: blue;
            
        }
        .win-content #retry{
            padding: 10px;
            background-color: rgb(7, 106, 73);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: large;
            cursor: pointer;
            transition: .3s all;
        }
        #retry:hover{
            background-color: green;
            transform: translateY(5px);
        }
       
      
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <!-- Menu Icon -->
            <div  class="menu-icon" onclick="toggleMenu()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <!-- Hidden Menu -->
            <nav id="menu" class="menu">
                <ul>
                    <li><a href="{% url 'index' %}">Home</a>
                        <a href="{% url 'wallet' %}">My Wallet</a>
                        <a href="{% url 'deposit' %}">Deposit</a>
                        <a href="{% url 'withdraw' %}">Withdraw</a>
                    </li>
                </ul>
            </nav>
            
            <div id="h1">
                <h1>LUCKY NUMBER BET</h1>
            </div>
            <div >
                <a id="hd-btn" href="{% url 'login' %}"><button onclick="logout()">Log Out</button></a>
            </div>
            
        </div>
    </header>
    <main>
        <h1>Congs You Win! 😍😊😎</h1>
        <div class="win-content">
            <p>Wow... what a Luck! 🤔</p>
            <div>
                <p id="win">UGX: 2000</p>
            </div>
            <a href="{% url 'index' %}"><button id="retry">Win Again</button></a>
        </div>
            
    </main>
</body>
<script>
    function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block"
    }
</script>
</html>
